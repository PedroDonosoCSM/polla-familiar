<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Polla Familiar 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#11253F;--ink-2:#1B3556;--pitch:#15B66E;--gold:#FFC83D;--hot:#FF5470;
    --bg:#EAEEEC;--surface:#FFFFFF;--line:#DFE5E2;--muted:#6B7B86;
    --shadow:0 6px 22px rgba(17,37,63,.10);--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45}
  .tnum{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:16px}
  #app{min-height:100%;display:flex;flex-direction:column}
  .topbar{background:var(--ink);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:30}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .brand .ball{font-size:22px}
  .brand small{display:block;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:.18em}
  .brand h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;letter-spacing:.02em;text-transform:uppercase;white-space:nowrap}
  .topbar-right{display:flex;align-items:center;gap:8px}
  .who{text-align:right;line-height:1.1;max-width:120px;overflow:hidden}
  .who b{display:block;font-size:13px;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}
  .who span{font-size:10px;color:#9FB1C2}
  .icon-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.10);display:grid;place-items:center;font-size:16px}
  .icon-btn:hover{background:rgba(255,255,255,.18)}
  main{flex:1;width:100%;max-width:760px;margin:0 auto;padding:18px 14px 96px}
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--surface);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 18px rgba(17,37,63,.06)}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;color:var(--muted);border-radius:12px;font-size:10px;font-weight:600}
  .nav button .ico{font-size:19px}
  .nav button.active{color:var(--ink)}
  .nav button.active::after{content:"";width:18px;height:3px;border-radius:3px;background:var(--pitch);margin-top:1px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 12px}
  .section-head h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;text-transform:uppercase;letter-spacing:.02em}
  .eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.18em;color:var(--pitch);text-transform:uppercase}
  .muted{color:var(--muted)}.center{text-align:center}.hidden{display:none!important}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}
  .pill.open{background:rgba(21,182,110,.14);color:#0C7A48}
  .pill.closed{background:#F0E2E5;color:#A23B4E}
  .pill.sent{background:rgba(255,200,61,.20);color:#8A6300}
  .phase-row{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px}
  .phase-row::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:8px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:14px;color:var(--muted)}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .ticket{margin-bottom:12px;overflow:hidden}
  .ticket-meta{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px dashed var(--line);font-size:11px;color:var(--muted)}
  .ticket-meta .grp{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.1em;color:var(--ink)}
  .ticket-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:14px 12px}
  .team{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;min-width:0}
  .team .flag{font-size:30px}
  .team .name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px;line-height:1.05;text-transform:uppercase}
  .score-pod{display:flex;align-items:center;gap:8px}
  .stepper{display:flex;flex-direction:column;align-items:center;gap:5px}
  .stepper .digit{width:46px;height:52px;border-radius:12px;background:var(--ink);color:var(--gold);display:grid;place-items:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:30px}
  .stepper .digit.empty{color:#5C7186}
  .stepper-btns{display:flex;gap:5px}
  .stepper-btns button{width:30px;height:26px;border-radius:8px;background:#EEF2F0;color:var(--ink);font-weight:700;font-size:15px;border:1px solid var(--line)}
  .stepper-btns button:active{background:var(--pitch);color:#fff}
  .vs{color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px}
  .ticket.locked .ticket-body{opacity:.55}.ticket.locked .stepper-btns{display:none}
  .field{margin-bottom:14px}
  .field label{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:13px;margin-bottom:6px}
  .field input,.field select{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:#FBFCFB;color:var(--ink)}
  .field input:focus,.field select:focus{outline:none;border-color:var(--pitch);box-shadow:0 0 0 3px rgba(21,182,110,.15)}
  .pad{padding:16px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .actions{position:sticky;bottom:74px;z-index:20;display:flex;gap:10px;margin-top:8px}
  .btn{flex:1;padding:14px;border-radius:14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;text-transform:uppercase;letter-spacing:.04em;box-shadow:var(--shadow)}
  .btn.ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink)}
  .btn.primary{background:var(--pitch);color:#fff}.btn.send{background:var(--ink);color:var(--gold)}
  .btn:disabled{opacity:.45;box-shadow:none}
  .ranktable{width:100%;border-collapse:collapse}
  .ranktable th{font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:12px;color:var(--muted);text-align:right;padding:10px 8px;border-bottom:1px solid var(--line)}
  .ranktable th:first-child,.ranktable th:nth-child(2){text-align:left}
  .ranktable td{padding:12px 8px;border-bottom:1px solid var(--line);text-align:right;font-size:14px}
  .ranktable td:nth-child(2){text-align:left;font-weight:600}
  .ranktable .pts{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px}
  .ranktable tr.me{background:rgba(255,200,61,.14)}
  .pos-badge{display:inline-grid;place-items:center;width:26px;height:26px;border-radius:8px;background:#EEF2F0;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px}
  .pos-badge.g1{background:var(--gold)}.pos-badge.g2{background:#D7DEE2}.pos-badge.g3{background:#E7C9A6}
  .res-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line)}
  .res-row:last-child{border-bottom:none}
  .res-team{display:flex;align-items:center;gap:7px;font-weight:600;font-size:14px}
  .res-team.away{justify-content:flex-end}
  .res-score{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;background:var(--ink);color:var(--gold);padding:3px 12px;border-radius:10px}
  .scorers{font-size:11px;color:var(--muted);padding:0 14px 10px;margin-top:-4px}
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(140% 120% at 50% -10%, #1B3556 0%, var(--ink) 55%, #0A1A2E 100%)}
  .login-card{width:100%;max-width:380px;text-align:center;color:#fff}
  .login-card .crest{font-size:54px;margin-bottom:6px}
  .login-card h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:34px;text-transform:uppercase;line-height:.95}
  .login-card .yr{color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:46px}
  .login-card p.sub{color:#A9BBCB;margin:6px 0 26px;font-size:14px}
  .login-form{background:var(--surface);border-radius:20px;padding:22px;color:var(--ink);text-align:left;box-shadow:0 20px 50px rgba(0,0,0,.35)}
  .login-form .btn{margin-top:6px;width:100%}
  .form-note{font-size:12px;color:var(--muted);margin-top:12px;text-align:center}
  .err{color:var(--hot);font-size:13px;font-weight:600;margin-top:8px;min-height:18px}
  .ok-msg{color:#0C7A48;font-size:13px;font-weight:600;margin-top:8px}
  #toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);z-index:60;background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.ok{background:#0C7A48}#toast.bad{background:#A23B4E}
  .modal-back{position:fixed;inset:0;background:rgba(11,25,42,.55);z-index:50;display:grid;place-items:center;padding:18px}
  .modal{background:var(--surface);border-radius:18px;max-width:440px;width:100%;max-height:82vh;overflow:auto;box-shadow:var(--shadow)}
  .modal header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface)}
  .modal header h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;text-transform:uppercase}
  .modal .body{padding:18px}
  .empty{padding:40px 18px;text-align:center;color:var(--muted)}.empty .big{font-size:38px;margin-bottom:8px}
  .loader{display:grid;place-items:center;padding:48px}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--pitch);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .fade-in{animation:fi .28s ease both}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .banner{background:#FFF6E0;border:1px solid #FFE2A8;color:#7A5A00;border-radius:12px;padding:11px 14px;font-size:13px;margin-bottom:14px}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
  @media(min-width:680px){.nav{position:sticky;bottom:0;max-width:760px;margin:0 auto;border-radius:14px 14px 0 0}}
</style>
</head>
<body>

<div id="login" class="login-wrap">
  <div class="login-card fade-in">
    <div class="crest">🏆</div>
    <h1>Polla Familiar</h1>
    <div class="yr">2026</div>
    <p class="sub">Pronostica el Mundial con la familia. Cada partido suma.</p>
    <div class="login-form">
      <div class="field" style="margin-bottom:10px">
        <label>Tu correo</label>
        <input id="in-email" type="email" inputmode="email" autocomplete="email" placeholder="nombre@correo.com">
      </div>
      <div class="field" style="margin-bottom:6px">
        <label>Tu clave</label>
        <input id="in-pass" type="password" autocomplete="current-password" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')entrar()">
      </div>
      <button class="btn primary" id="btn-entrar" onclick="entrar()">Entrar</button>
      <p class="form-note">La primera vez, escribe tu correo y crea una clave. Después entras con lo mismo.</p>
      <div class="err" id="login-err"></div>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand"><span class="ball">⚽</span><div><small>Polla Familiar</small><h1>Mundial 2026</h1></div></div>
    <div class="topbar-right">
      <div class="who"><b id="who-name">—</b><span>jugando</span></div>
      <button id="admin-btn" class="icon-btn hidden" title="Admin" onclick="openAdmin()">🛠️</button>
      <button class="icon-btn" title="Cómo se juega" onclick="openInfo()">ℹ️</button>
      <button class="icon-btn" title="Salir" onclick="logout()">⎋</button>
    </div>
  </div>
  <main id="view"></main>
  <nav class="nav">
    <button data-tab="pred" class="active" onclick="go('pred')"><span class="ico">📝</span>Pronósticos</button>
    <button data-tab="tabla" onclick="go('tabla')"><span class="ico">🏅</span>Tabla</button>
    <button data-tab="res" onclick="go('res')"><span class="ico">📊</span>Resultados</button>
    <button data-tab="todos" onclick="go('todos')"><span class="ico">👀</span>La familia</button>
    <button data-tab="equipos" onclick="go('equipos')"><span class="ico">👕</span>Planteles</button>
  </nav>
</div>

<div id="toast"></div>
<div id="modal-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://gamapljpgxxjkwhccdqa.supabase.co';
const SB_KEY = 'sb_publishable_w9PNVgyUz6IlFp596n2RHA_k69hwDkb';
const sb = supabase.createClient(SB_URL, SB_KEY);

const FASE_ORDER = ['GRUPOS','DIECISEISAVOS','OCTAVOS','CUARTOS','SEMIS','TERCER_LUGAR','FINAL'];
const NEUTRAL_FLAG = '⚪';
const S = { me:null, tab:'pred', fase:null, fasesHab:[], phases:{}, config:null,
            fixture:[], preds:{}, extras:{}, teams:[], submissions:{}, fixTodos:[] };
let PLAYERS_BY_NAME = {};

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function teamOf(m,side){
  const t = side==='home'? m.home_team : m.away_team;
  const lbl = side==='home'? m.home_label : m.away_label;
  return t ? {name:t.name, flag:t.flag} : {name:(lbl||'TBD'), flag:NEUTRAL_FLAG};
}
function lockedByDate(d){ if(!d) return false; const x=new Date(d); return !isNaN(x) && new Date()>=x; }
function fmtFecha(iso){ if(!iso) return ''; const d=new Date(iso); if(isNaN(d)) return '';
  return d.toLocaleString('es-CL',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
let toastT;
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+(type||'');clearTimeout(toastT);toastT=setTimeout(()=>t.className='',2600);}
function paint(html){const v=document.getElementById('view');v.innerHTML=html;v.classList.remove('fade-in');void v.offsetWidth;v.classList.add('fade-in');}
function loading(){document.getElementById('view').innerHTML='<div class="loader"><div class="spin"></div></div>';}
function emptyState(i,t,m){return '<div class="card empty"><div class="big">'+i+'</div><b style="font-size:16px">'+esc(t)+'</b><p class="muted" style="margin-top:6px">'+esc(m)+'</p></div>';}

function lerr(m){document.getElementById('login-err').textContent=m||'';}
async function entrar(){
  const email=(document.getElementById('in-email').value||'').trim().toLowerCase();
  const pass=(document.getElementById('in-pass').value||''); lerr('');
  if(!email||!email.includes('@')){lerr('Escribe un correo válido.');return;}
  if(pass.length<6){lerr('La clave debe tener al menos 6 caracteres.');return;}
  const btn=document.getElementById('btn-entrar'); if(btn){btn.disabled=true;btn.textContent='Entrando…';}
  // 1) intentar iniciar sesión con la clave
  let { error } = await sb.auth.signInWithPassword({ email, password:pass });
  if(!error) return; // onAuthStateChange -> boot
  // 2) si no existe, crear la cuenta (primera vez)
  const { data:su, error:errSignup } = await sb.auth.signUp({ email, password:pass });
  if(btn){btn.disabled=false;btn.textContent='Entrar';}
  if(errSignup){
    if(/already|registered|exists/i.test(errSignup.message||'')) lerr('Esa clave no coincide con el correo. Revísala e intenta de nuevo.');
    else lerr(errSignup.message);
    return;
  }
  if(su && su.session) return; // creada con sesión activa -> boot
  // sin sesión inmediata: confirmamos la cuenta del lado servidor y entramos
  if(btn){btn.disabled=true;btn.textContent='Entrando…';}
  try { await sb.rpc('confirm_email', { p_email: email }); } catch(e){}
  let { error:e2 } = await sb.auth.signInWithPassword({ email, password:pass });
  if(btn){btn.disabled=false;btn.textContent='Entrar';}
  if(!e2) return;
  lerr('No pudimos entrar. Si ya tienes cuenta, revisa tu clave; si es tu primera vez, intenta de nuevo.');
}
async function logout(){ await sb.auth.signOut(); location.reload(); }

sb.auth.onAuthStateChange((_e, session)=>{ if(session) boot(); });
(async ()=>{ const { data } = await sb.auth.getSession(); if(data.session) boot(); })();

let booted=false;
async function boot(){
  if(booted) return; booted=true;
  let { data, error } = await sb.rpc('register_participant');
  if(error && /NEED_NAME/.test(error.message||'')){
    const name = await askName();
    ({ data, error } = await sb.rpc('register_participant',{ p_name:name }));
  }
  if(error){ toast('No se pudo iniciar: '+error.message,'bad'); booted=false; return; }
  S.me = data;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('who-name').textContent = S.me.name;
  if(S.me.is_admin) document.getElementById('admin-btn').classList.remove('hidden');
  await loadReference();
  subscribeLive();
  go('pred');
}
async function loadReference(){
  const [ph, cfg, tm, subs] = await Promise.all([
    sb.from('phase_config').select('*'),
    sb.from('app_config').select('*').single(),
    sb.from('teams').select('id,name,flag').order('name'),
    sb.from('phase_submissions').select('phase').eq('participant_id', S.me.id)
  ]);
  (ph.data||[]).forEach(p=>S.phases[p.phase]=p);
  S.config = cfg.data||{};
  S.teams = tm.data||[];
  S.submissions = {}; (subs.data||[]).forEach(s=>S.submissions[s.phase]=true);
}
function subscribeLive(){
  sb.channel('live')
    .on('postgres_changes',{event:'*',schema:'public',table:'matches'},()=>{ if(S.tab==='tabla')loadTabla(); if(S.tab==='res')loadResultados(); if(S.tab==='todos')loadTodos(); })
    .on('postgres_changes',{event:'*',schema:'public',table:'predictions'},()=>{ if(S.tab==='tabla')loadTabla(); })
    .subscribe();
}
function askName(){
  return new Promise(res=>{
    document.getElementById('modal-root').innerHTML =
      '<div class="modal-back"><div class="modal"><header><h3>¡Bienvenido!</h3></header><div class="body">'
      +'<p class="muted" style="margin-bottom:12px">¿Cómo te llamas? Así te ven en la tabla.</p>'
      +'<div class="field"><input id="nm" placeholder="Ej: Pedro"></div>'
      +'<button class="btn primary" style="width:100%" id="nmgo">Entrar</button></div></div></div>';
    document.getElementById('nmgo').onclick=()=>{
      const v=(document.getElementById('nm').value||'').trim(); if(!v) return;
      document.getElementById('modal-root').innerHTML=''; res(v);
    };
  });
}

function go(tab){
  S.tab=tab;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  loading();
  if(tab==='pred')return loadPred();
  if(tab==='tabla')return loadTabla();
  if(tab==='res')return loadResultados();
  if(tab==='todos')return loadTodos();
  if(tab==='equipos')return loadEquipos();
}

const MATCH_COLS='id,phase,group_name,kickoff_at,stadium,deadline_at,enabled,status,live_clock,home_goals,away_goals,home_scorers,away_scorers,home_label,away_label,home_team:home_team_id(name,flag),away_team:away_team_id(name,flag)';
async function loadPred(){
  const { data } = await sb.from('matches').select('phase').eq('enabled',true);
  const set=[...new Set((data||[]).map(r=>r.phase))];
  S.fasesHab = FASE_ORDER.filter(f=>set.includes(f));
  if(S.fasesHab.length===0) return paint(emptyState('⏳','Aún no hay fases abiertas','Cuando se habilite una fase, podrás cargar tus pronósticos aquí.'));
  if(!S.fasesHab.includes(S.fase)) S.fase=S.fasesHab[0];
  await loadFase();
}
async function loadFase(){
  const fase=S.fase;
  const [fx, pr, bn] = await Promise.all([
    sb.from('matches').select(MATCH_COLS).eq('phase',fase).eq('enabled',true).order('id'),
    sb.from('predictions').select('match_id,home_goals,away_goals').eq('participant_id',S.me.id),
    fase==='GRUPOS'? sb.from('bonus_predictions').select('top_scorer:top_scorer_id(id,name),mvp:mvp_id(id,name),finalist1_id,finalist2_id').eq('participant_id',S.me.id).single() : Promise.resolve({data:null})
  ]);
  S.fixture = fx.data||[];
  S.preds={}; (pr.data||[]).forEach(p=>S.preds[p.match_id]={home:p.home_goals,away:p.away_goals});
  if(fase==='GRUPOS' && bn.data){
    S.extras={ goleador: bn.data.top_scorer?.name||'', mvp: bn.data.mvp?.name||'',
               finalist1_id: bn.data.finalist1_id, finalist2_id: bn.data.finalist2_id };
  }
  renderPred();
}
function renderPred(){
  const fase=S.fase, ph=S.phases[fase]||{points_exact:2,points_winner:1,label:fase};
  const enviada=!!S.submissions[fase];
  let chips='<div class="phase-row">'+S.fasesHab.map(f=>'<button class="chip '+(f===fase?'active':'')+'" onclick="selFase(\''+f+'\')">'+esc(S.phases[f]?.label||f)+'</button>').join('')+'</div>';
  let head='<div class="section-head"><div><div class="eyebrow">Mis pronósticos</div><h2>'+esc(ph.label)+'</h2></div>'
    +(enviada?'<span class="pill sent">✓ Enviado</span>':'<span class="muted" style="font-size:12px">Exacto +'+ph.points_exact+' · Ganador +'+ph.points_winner+'</span>')+'</div>';
  let banner = enviada? '<div class="banner">Ya enviaste esta fase. Tus pronósticos quedaron guardados y no se pueden cambiar.</div>':'';
  let tickets='';
  if(S.fixture.length===0) tickets=emptyState('🗓️','Sin partidos','Esta fase aún no tiene partidos.');
  else S.fixture.forEach(m=>{
    const locked=enviada||lockedByDate(m.deadline_at);
    const p=S.preds[m.id]||{};
    tickets+=ticket(m, (p.home==null?null:p.home), (p.away==null?null:p.away), locked);
  });
  let extras = fase==='GRUPOS'? extrasBlock(enviada||lockedByDate(ph.deadline)) : '';
  let actions='';
  if(!enviada){
    const canSend = S.config.submissions_open || S.me.can_submit;
    actions='<div class="actions"><button class="btn ghost" onclick="guardar(false)">Guardar borrador</button>'
      +'<button class="btn send" '+(canSend?'':'disabled')+' onclick="guardar(true)">Enviar definitivo</button></div>'
      +(canSend?'':'<p class="muted center" style="font-size:12px;margin-top:8px">El envío definitivo se abre cuando el admin lo habilite.</p>');
  }
  paint(chips+head+banner+tickets+extras+actions);
}
function ticket(m,lv,vv,locked){
  const h=teamOf(m,'home'), a=teamOf(m,'away');
  const grp=(m.group_name?'Grupo '+m.group_name:(S.phases[m.phase]?.label||m.phase));
  const status=locked?'<span class="pill closed">Cerrado</span>':'<span class="pill open">'+esc(fmtFecha(m.kickoff_at))+'</span>';
  return '<div class="card ticket '+(locked?'locked':'')+'">'
    +'<div class="ticket-meta"><span class="grp">'+esc(grp)+'</span>'+status+'</div>'
    +'<div class="ticket-body">'
    +'<div class="team"><span class="flag">'+h.flag+'</span><span class="name">'+esc(h.name)+'</span></div>'
    +'<div class="score-pod">'+stepper(m.id,'home',lv,locked)+'<span class="vs">vs</span>'+stepper(m.id,'away',vv,locked)+'</div>'
    +'<div class="team"><span class="flag">'+a.flag+'</span><span class="name">'+esc(a.name)+'</span></div>'
    +'</div></div>';
}
function stepper(id,side,val,locked){
  const empty=(val==null), digit=empty?'–':String(val);
  const btns=locked?'':'<div class="stepper-btns"><button onclick="adj('+id+',\''+side+'\',-1)">–</button><button onclick="adj('+id+',\''+side+'\',1)">+</button></div>';
  return '<div class="stepper"><div class="digit '+(empty?'empty':'')+'" id="d-'+id+'-'+side+'">'+digit+'</div>'+btns+'</div>';
}
function adj(id,side,d){
  if(!S.preds[id])S.preds[id]={home:null,away:null};
  let c=S.preds[id][side]; c=(c==null)?null:Number(c);
  let n = d>0 ? (c==null?0:Math.min(c+1,20)) : (c==null?null:(c<=0?null:c-1));
  S.preds[id][side]=n;
  const el=document.getElementById('d-'+id+'-'+side);
  if(el){el.textContent=(n==null?'–':n);el.classList.toggle('empty',n==null);}
}
function extrasBlock(locked){

async function ensurePlayerMap(){
  if(Object.keys(PLAYERS_BY_NAME).length) return;

async function guardar(definitivo){
  const fase=S.fase;
  const items=S.fixture.map(m=>({match_id:m.id, home:(S.preds[m.id]?.home??null), away:(S.preds[m.id]?.away??null)}))
                       .filter(x=>x.home!=null && x.away!=null);
  if(definitivo && !confirm('Al enviar no podrás cambiar tus pronósticos de '+(S.phases[fase]?.label||fase)+'. ¿Enviar?')) return;
  toast('Guardando…');
  if(fase==='GRUPOS'){
    const f1=document.getElementById('ex-f1'), f2=document.getElementById('ex-f2');
    if(f1 && !f1.disabled){
      await ensurePlayerMap();
      await sb.rpc('save_bonus',{ p_top:resolvePlayer(document.getElementById('ex-gol').value),
        p_mvp:resolvePlayer(document.getElementById('ex-mvp').value),
        p_f1:f1.value?Number(f1.value):null, p_f2:f2.value?Number(f2.value):null });
    }
  }
  const { data, error } = await sb.rpc('save_predictions',{ p_phase:fase, p_items:items, p_final:definitivo });
  if(error){ toast('Error: '+error.message,'bad'); return; }
  if(data!=='OK'){ toast(traduce(data),'bad'); return; }
  if(definitivo){ S.submissions[fase]=true; toast('¡Enviado! Buena suerte','ok'); renderPred(); }
  else toast('Borrador guardado','ok');
}

function normTxt(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function pickScorer(pickName, scorers){
  if(!pickName) return null;
  const toks=normTxt(pickName).split(/\s+/).filter(t=>t.length>=4);
  return (scorers||[]).find(s=>{ const n=normTxt(s.name); return toks.some(t=>n.includes(t)); }) || null;
}
async function loadTodos(){
  if(!S.config.predictions_visible) return paint(emptyState('🤫','Pronósticos ocultos','Las predicciones de todos se revelan al cerrar la fase de grupos.'));

    sb.from('matches').select(MATCH_COLS).eq('phase','GRUPOS').eq('enabled',true).order('id'),
    sb.from('bonus_predictions').select('points,participant:participant_id(name),top_scorer:top_scorer_id(name),mvp:mvp_id(name),finalist1:finalist1_id(name,flag),finalist2:finalist2_id(name,flag)'),
    sb.rpc('get_scorers')
  ]);

  const scorers = sc.data || [];

  let h='<div class="section-head"><div><div class="eyebrow">Sin secretos</div><h2>La familia</h2></div></div>';

  // ---- Goleador en curso ----

    leaders.forEach(l=>{ h+='<span style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:18px">⚽ '+esc(l.name)+' <span style="color:var(--pitch)">'+l.goals+'</span></span>'; });
    h+='</div>';
    if(scorers.length>leaders.length){
      h+='<div class="muted" style="font-size:12px;margin-top:8px">Persiguen: '+scorers.slice(leaders.length,leaders.length+6).map(s=>esc(s.name)+' ('+s.goals+')').join(' · ')+'</div>';
    }
  }
  h+='</div>';

  h+='<div class="field" style="margin-top:16px"><label>Ver pronósticos de un partido</label><select id="tm" onchange="verPartido()"><option value="">— elige —</option>'
    +S.fixTodos.map(m=>{const a=teamOf(m,'home'),b=teamOf(m,'away');return '<option value="'+m.id+'">'+a.flag+' '+esc(a.name)+' vs '+esc(b.name)+' '+b.flag+'</option>';}).join('')+'</select></div>';

function filtraEq(){const q=(document.getElementById('eq-q').value||'').toLowerCase().trim();

function openInfo(){
  const rows=FASE_ORDER.map(f=>{const p=S.phases[f]||{};return '<div>'+esc(p.label||f)+'</div><b class="center">+'+(p.points_exact||'')+'</b><b class="center">+'+(p.points_winner||'')+'</b>';}).join('');
  document.getElementById('modal-root').innerHTML='<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal"><header><h3>Cómo se juega</h3><button class="icon-btn" style="background:#EEF2F0;color:var(--ink)" onclick="closeModal()">✕</button></header><div class="body"><p class="muted" style="font-size:13px;margin-bottom:16px">Pronostica el marcador exacto. Aciertas más mientras más avanza el torneo.</p><div style="display:grid;grid-template-columns:1fr auto auto;gap:8px 12px;font-size:14px;align-items:center"><div class="eyebrow">Fase</div><div class="eyebrow center">Exacto</div><div class="eyebrow center">Ganador</div>'+rows+'</div><p class="muted" style="font-size:12px;margin-top:16px">Bonus: 🥇 Goleador +5 · ⭐ MVP +5 · 🏁 un finalista +2 · los dos +6.</p></div></div></div>';
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

async function openAdmin(){
  const { data:fin } = await sb.from('matches').select(MATCH_COLS).eq('enabled',true).neq('status','FINALIZADO').order('id').limit(80);
  const opts=(fin||[]).map(m=>{const a=teamOf(m,'home'),b=teamOf(m,'away');return '<option value="'+m.id+'">#'+m.id+' '+esc(a.name)+' vs '+esc(b.name)+'</option>';}).join('');
  const phaseOpts=FASE_ORDER.map(f=>'<option value="'+f+'">'+esc(S.phases[f]?.label||f)+'</option>').join('');
  document.getElementById('modal-root').innerHTML='<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal"><header><h3>Admin</h3><button class="icon-btn" style="background:#EEF2F0;color:var(--ink)" onclick="closeModal()">✕</button></header><div class="body">'
    +'<div class="eyebrow" style="margin-bottom:8px">Cargar resultado</div>'
    +'<div class="field"><select id="ad-m">'+opts+'</select></div>'
    +'<div class="grid2"><div class="field"><label>Local</label><input id="ad-h" inputmode="numeric"></div><div class="field"><label>Visita</label><input id="ad-a" inputmode="numeric"></div></div>'
    +'<div class="field"><label>Goleadores local</label><input id="ad-hs" placeholder="opcional"></div>'
    +'<div class="field"><label>Goleadores visita</label><input id="ad-as" placeholder="opcional"></div>'
    +'<button class="btn primary" style="width:100%" onclick="adResult()">Guardar resultado</button>'
    +'<div class="eyebrow" style="margin:22px 0 8px">Habilitar fase</div><div class="field"><select id="ad-ph">'+phaseOpts+'</select></div>'
    +'<button class="btn ghost" style="width:100%" onclick="adPhase()">Habilitar partidos de la fase</button>'
    +'<div class="eyebrow" style="margin:22px 0 8px">Visibilidad</div>'
    +'<label style="display:flex;gap:8px;align-items:center;margin-bottom:10px"><input type="checkbox" id="ad-vis" '+(S.config.predictions_visible?'checked':'')+'> Mostrar pronósticos de todos</label>'
    +'<label style="display:flex;gap:8px;align-items:center;margin-bottom:14px"><input type="checkbox" id="ad-sub" '+(S.config.submissions_open?'checked':'')+'> Permitir envío definitivo</label>'
    +'<button class="btn ghost" style="width:100%" onclick="adFlags()">Guardar visibilidad</button>'
    +'</div></div></div>';
}
async function adResult(){
  const id=Number(document.getElementById('ad-m').value);
  const h=Number(document.getElementById('ad-h').value), a=Number(document.getElementById('ad-a').value);
  if(isNaN(h)||isNaN(a)){toast('Pon ambos marcadores','bad');return;}
  const { error }=await sb.rpc('set_result',{p_match_id:id,p_home:h,p_away:a,p_home_scorers:document.getElementById('ad-hs').value||null,p_away_scorers:document.getElementById('ad-as').value||null});
  toast(error?('Error: '+error.message):'Resultado guardado',error?'bad':'ok');
}
async function adPhase(){const { error }=await sb.rpc('enable_phase',{p_phase:document.getElementById('ad-ph').value});toast(error?'Error':'Fase habilitada',error?'bad':'ok');}
async function adFlags(){const { error }=await sb.rpc('set_flags',{p_predictions_visible:document.getElementById('ad-vis').checked,p_submissions_open:document.getElementById('ad-sub').checked});
  if(!error){S.config.predictions_visible=document.getElementById('ad-vis').checked;S.config.submissions_open=document.getElementById('ad-sub').checked;}
  toast(error?'Error':'Guardado',error?'bad':'ok');}
</script>
</body>
</html>
