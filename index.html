<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Polla Familiar 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#11253F;--ink-2:#1B3556;--pitch:#15B66E;--gold:#FFC83D;--hot:#FF5470;
    --bg:#EAEEEC;--surface:#FFFFFF;--line:#DFE5E2;--muted:#6B7B86;
    --shadow:0 6px 22px rgba(17,37,63,.10);--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.45}
  .tnum{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:16px}
  #app{min-height:100%;display:flex;flex-direction:column}
  .topbar{background:var(--ink);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:30}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .brand .ball{font-size:22px}
  .brand small{display:block;color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:11px;letter-spacing:.18em}
  .brand h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;letter-spacing:.02em;text-transform:uppercase;white-space:nowrap}
  .topbar-right{display:flex;align-items:center;gap:8px}
  .who{text-align:right;line-height:1.1;max-width:120px;overflow:hidden}
  .who b{display:block;font-size:13px;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}
  .who span{font-size:10px;color:#9FB1C2}
  .icon-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.10);display:grid;place-items:center;font-size:16px}
  .icon-btn:hover{background:rgba(255,255,255,.18)}
  main{flex:1;width:100%;max-width:760px;margin:0 auto;padding:18px 14px 96px}
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--surface);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom));box-shadow:0 -4px 18px rgba(17,37,63,.06)}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;color:var(--muted);border-radius:12px;font-size:10px;font-weight:600}
  .nav button .ico{font-size:19px}
  .nav button.active{color:var(--ink)}
  .nav button.active::after{content:"";width:18px;height:3px;border-radius:3px;background:var(--pitch);margin-top:1px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 12px}
  .section-head h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;text-transform:uppercase;letter-spacing:.02em}
  .eyebrow{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;letter-spacing:.18em;color:var(--pitch);text-transform:uppercase}
  .muted{color:var(--muted)}.center{text-align:center}.hidden{display:none!important}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px}
  .pill.open{background:rgba(21,182,110,.14);color:#0C7A48}
  .pill.closed{background:#F0E2E5;color:#A23B4E}
  .pill.sent{background:rgba(255,200,61,.20);color:#8A6300}
  .phase-row{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px}
  .phase-row::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:8px 14px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:14px;color:var(--muted)}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .ticket{margin-bottom:12px;overflow:hidden}
  .ticket-meta{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px dashed var(--line);font-size:11px;color:var(--muted)}
  .ticket-meta .grp{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.1em;color:var(--ink)}
  .ticket-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:14px 12px}
  .team{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;min-width:0}
  .team .flag{font-size:30px}
  .team .name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px;line-height:1.05;text-transform:uppercase}
  .score-pod{display:flex;align-items:center;gap:8px}
  .stepper{display:flex;flex-direction:column;align-items:center;gap:5px}
  .stepper .digit{width:46px;height:52px;border-radius:12px;background:var(--ink);color:var(--gold);display:grid;place-items:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:30px}
  .stepper .digit.empty{color:#5C7186}
  .stepper-btns{display:flex;gap:5px}
  .stepper-btns button{width:30px;height:26px;border-radius:8px;background:#EEF2F0;color:var(--ink);font-weight:700;font-size:15px;border:1px solid var(--line)}
  .stepper-btns button:active{background:var(--pitch);color:#fff}
  .vs{color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px}
  .ticket.locked .ticket-body{opacity:.55}.ticket.locked .stepper-btns{display:none}
  .field{margin-bottom:14px}
  .field label{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-size:13px;margin-bottom:6px}
  .field input,.field select{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:#FBFCFB;color:var(--ink)}
  .field input:focus,.field select:focus{outline:none;border-color:var(--pitch);box-shadow:0 0 0 3px rgba(21,182,110,.15)}
  .pad{padding:16px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .actions{position:sticky;bottom:74px;z-index:20;display:flex;gap:10px;margin-top:8px}
  .btn{flex:1;padding:14px;border-radius:14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;text-transform:uppercase;letter-spacing:.04em;box-shadow:var(--shadow)}
  .btn.ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink)}
  .btn.primary{background:var(--pitch);color:#fff}.btn.send{background:var(--ink);color:var(--gold)}
  .btn:disabled{opacity:.45;box-shadow:none}
  .ranktable{width:100%;border-collapse:collapse}
  .ranktable th{font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.02em;font-size:10px;color:var(--muted);text-align:right;padding:10px 4px;border-bottom:1px solid var(--line)}
  .ranktable th:first-child,.ranktable th:nth-child(2){text-align:left}
  .ranktable td{padding:11px 4px;border-bottom:1px solid var(--line);text-align:right;font-size:13px}
  .ranktable td:nth-child(2){text-align:left;font-weight:600}
  .ranktable .pts{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px}
  .ranktable tr.me{background:rgba(255,200,61,.14)}
  .pos-badge{display:inline-grid;place-items:center;width:26px;height:26px;border-radius:8px;background:#EEF2F0;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px}
  .pos-badge.g1{background:var(--gold)}.pos-badge.g2{background:#D7DEE2}.pos-badge.g3{background:#E7C9A6}
  .res-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line)}
  .res-row:last-child{border-bottom:none}
  .res-team{display:flex;align-items:center;gap:7px;font-weight:600;font-size:14px}
  .res-team.away{justify-content:flex-end}
  .res-score{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;background:var(--ink);color:var(--gold);padding:3px 12px;border-radius:10px}
  .scorers{font-size:11px;color:var(--muted);padding:0 14px 10px;margin-top:-4px}
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(140% 120% at 50% -10%, #1B3556 0%, var(--ink) 55%, #0A1A2E 100%)}
  .login-card{width:100%;max-width:380px;text-align:center;color:#fff}
  .login-card .crest{font-size:54px;margin-bottom:6px}
  .login-card h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:34px;text-transform:uppercase;line-height:.95}
  .login-card .yr{color:var(--gold);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:46px}
  .login-card p.sub{color:#A9BBCB;margin:6px 0 22px;font-size:14px}
  .prof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .prof-card{cursor:pointer;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:14px 6px 10px;text-align:center;transition:transform .12s,background .12s}
  .prof-card:active{transform:scale(.96)}
  .prof-card:hover{background:rgba(255,255,255,.12)}
  .prof-av{width:54px;height:54px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;color:#0B1B2B}
  .prof-name{color:#fff;font-size:13px;font-weight:600;line-height:1.1}
  .prof-lock{font-size:10px;color:#9FB2C4;margin-top:3px}
  .pin-modal{position:fixed;inset:0;background:rgba(8,18,30,.88);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px}
  .pin-card{background:#fff;border-radius:18px;padding:26px 22px;width:100%;max-width:320px;text-align:center;position:relative}
  .pin-close{position:absolute;top:8px;right:12px;border:none;background:none;font-size:18px;color:var(--muted);cursor:pointer}
  .pin-av{width:64px;height:64px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:30px;color:#0B1B2B}
  .pin-card h2{font-family:'Barlow Condensed',sans-serif;font-size:24px;line-height:1;margin-bottom:4px;color:var(--ink)}
  #pin-input{width:170px;text-align:center;letter-spacing:14px;font-size:30px;font-weight:700;padding:10px;margin:16px auto;display:block;border:2px solid var(--line);border-radius:12px;color:var(--ink)}
  #pin-input:focus{outline:none;border-color:var(--pitch)}
  .podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-items:end;margin:4px 0 18px}
  .pod-col{display:flex;flex-direction:column;align-items:center;text-align:center}
  .pod-medal{font-size:26px;line-height:1}
  .pod-people{display:flex;flex-direction:column;gap:3px;margin:5px 0 2px}
  .pod-person{display:flex;align-items:center;gap:5px;justify-content:center}
  .pod-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;color:#0B1B2B;flex:none}
  .pod-name{font-size:12px;font-weight:600;color:var(--ink);line-height:1.1}
  .pod-pts{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:var(--muted);margin-bottom:5px}
  .pod-block{width:100%;border-radius:10px 10px 0 0;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px}
  .pod-block.gold{height:84px;background:linear-gradient(#FFD451,#E2A400)}
  .pod-block.silver{height:64px;background:linear-gradient(#CBD4DE,#98A6B6)}
  .pod-block.bronze{height:50px;background:linear-gradient(#E2A36D,#AE6B34)}
  .player-card{background:#fff;border-radius:18px;padding:20px 18px;width:100%;max-width:440px;max-height:86vh;overflow:auto;position:relative}
  .pp-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:6px 0 4px;text-align:center}
  .pp-stats>div{background:#F4F6F8;border-radius:10px;padding:8px 4px;font-size:11px;color:var(--muted)}
  .pp-stats>div span{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;color:var(--ink)}
  .pp-sumwrap{margin:12px 0 2px;font-size:12px;color:var(--muted);line-height:1.7}
  .pp-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)}
  .pp-match{font-size:13px}
  .pp-sub{font-size:11px;color:var(--muted)}
  .pp-tag{font-size:10px;font-weight:700;padding:3px 7px;border-radius:999px;white-space:nowrap}
  .pp-tag.ex{background:#D7F5E3;color:#0B7A3B}
  .pp-tag.win{background:#FFF1CC;color:#8A6A00}
  .pp-tag.miss{background:#F0F0F0;color:#888}
  .pp-tag.pend{background:#E8F0FA;color:#3B6EA5}
  .brk-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .login-form{background:var(--surface);border-radius:20px;padding:22px;color:var(--ink);text-align:left;box-shadow:0 20px 50px rgba(0,0,0,.35)}
  .login-form .btn{margin-top:6px;width:100%}
  .form-note{font-size:12px;color:var(--muted);margin-top:12px;text-align:center}
  .err{color:var(--hot);font-size:13px;font-weight:600;margin-top:8px;min-height:18px}
  .ok-msg{color:#0C7A48;font-size:13px;font-weight:600;margin-top:8px}
  #toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);z-index:60;background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-weight:600;font-size:14px;box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.ok{background:#0C7A48}#toast.bad{background:#A23B4E}
  .modal-back{position:fixed;inset:0;background:rgba(11,25,42,.55);z-index:50;display:grid;place-items:center;padding:18px}
  .modal{background:var(--surface);border-radius:18px;max-width:440px;width:100%;max-height:82vh;overflow:auto;box-shadow:var(--shadow)}
  .modal header{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface)}
  .modal header h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;text-transform:uppercase}
  .modal .body{padding:18px}
  .empty{padding:40px 18px;text-align:center;color:var(--muted)}.empty .big{font-size:38px;margin-bottom:8px}
  .loader{display:grid;place-items:center;padding:48px}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--pitch);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .fade-in{animation:fi .28s ease both}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .banner{background:#FFF6E0;border:1px solid #FFE2A8;color:#7A5A00;border-radius:12px;padding:11px 14px;font-size:13px;margin-bottom:14px}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
  @media(min-width:680px){.nav{position:sticky;bottom:0;max-width:760px;margin:0 auto;border-radius:14px 14px 0 0}}
</style>
</head>
<body>

<div id="login" class="login-wrap">
  <div class="login-card fade-in">
    <div class="crest">🏆</div>
    <h1>Polla Familiar</h1>
    <div class="yr">2026</div>
    <p class="sub">Elige tu perfil para entrar.</p>
    <div id="profiles" class="prof-grid"></div>
    <div class="err" id="login-err" style="margin-top:12px;color:#FFB4B4"></div>
  </div>
</div>

<div id="pinModal" class="pin-modal hidden">
  <div class="pin-card fade-in">
    <button class="pin-close" onclick="closePin()">✕</button>
    <div class="pin-av" id="pin-av"></div>
    <h2 id="pin-title">—</h2>
    <p class="muted" id="pin-sub" style="font-size:13px"></p>
    <input id="pin-input" inputmode="numeric" pattern="[0-9]*" maxlength="4" autocomplete="off" placeholder="••••" onkeydown="if(event.key==='Enter')submitPin()">
    <button class="btn primary" id="pin-btn" onclick="submitPin()">Entrar</button>
    <div class="err" id="pin-err" style="margin-top:8px"></div>
  </div>
</div>

<div id="playerModal" class="pin-modal hidden" onclick="if(event.target===this)closePlayer()">
  <div class="player-card" id="player-body"></div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand"><span class="ball">⚽</span><div><small>Polla Familiar</small><h1>Mundial 2026</h1></div></div>
    <div class="topbar-right">
      <span id="my-av" onclick="pickAvatar()" title="Cambiar mi foto" style="cursor:pointer;display:inline-flex"></span>
      <input type="file" id="av-file" accept="image/*" style="display:none" onchange="onAvatarFile(event)">
      <div class="who"><b id="who-name">—</b><span>jugando</span></div>
      <button id="admin-btn" class="icon-btn hidden" title="Admin" onclick="openAdmin()">🛠️</button>
      <button class="icon-btn" title="Cómo se juega" onclick="openInfo()">ℹ️</button>
      <button class="icon-btn" title="Cambiar perfil" onclick="logout()">⎋</button>
    </div>
  </div>
  <main id="view"></main>
  <nav class="nav">
    <button data-tab="pred" class="active" onclick="go('pred')"><span class="ico">📝</span>Pronósticos</button>
    <button data-tab="tabla" onclick="go('tabla')"><span class="ico">🏅</span>Tabla</button>
    <button data-tab="res" onclick="go('res')"><span class="ico">📊</span>Resultados</button>
    <button data-tab="llave" onclick="go('llave')"><span class="ico">🏆</span>Llave</button>
    <button data-tab="todos" onclick="go('todos')"><span class="ico">👀</span>La familia</button>
    <button data-tab="equipos" onclick="go('equipos')"><span class="ico">👕</span>Planteles</button>
  </nav>
</div>

<div id="toast"></div>
<div id="modal-root"></div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
const SB_URL = 'https://gamapljpgxxjkwhccdqa.supabase.co';
const SB_KEY = 'sb_publishable_w9PNVgyUz6IlFp596n2RHA_k69hwDkb';
const sb = supabase.createClient(SB_URL, SB_KEY);

const FASE_ORDER = ['GRUPOS','DIECISEISAVOS','OCTAVOS','CUARTOS','SEMIS','TERCER_LUGAR','FINAL'];
const NEUTRAL_FLAG = '⚪';
const S = { me:null, tab:'pred', fase:null, fasesHab:[], phases:{}, config:null,
            fixture:[], preds:{}, extras:{}, teams:[], submissions:{}, fixTodos:[], avatars:{}, koRound:null, celebrated:null };
let PLAYERS_BY_NAME = {};

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function teamOf(m,side){
  const t = side==='home'? m.home_team : m.away_team;
  const lbl = side==='home'? m.home_label : m.away_label;
  return t ? {name:t.name, flag:t.flag} : {name:(lbl||'TBD'), flag:NEUTRAL_FLAG};
}
function lockedByDate(d){ if(!d) return false; const x=new Date(d); return !isNaN(x) && new Date()>=x; }
function fmtFecha(iso){ if(!iso) return ''; const d=new Date(iso); if(isNaN(d)) return '';
  return d.toLocaleString('es-CL',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
let toastT;
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+(type||'');clearTimeout(toastT);toastT=setTimeout(()=>t.className='',2600);}
function paint(html){const v=document.getElementById('view');v.innerHTML=html;v.classList.remove('fade-in');void v.offsetWidth;v.classList.add('fade-in');}
function loading(){document.getElementById('view').innerHTML='<div class="loader"><div class="spin"></div></div>';}
function emptyState(i,t,m){return '<div class="card empty"><div class="big">'+i+'</div><b style="font-size:16px">'+esc(t)+'</b><p class="muted" style="margin-top:6px">'+esc(m)+'</p></div>';}

function lerr(m){const el=document.getElementById('login-err'); if(el) el.textContent=m||'';}
function perr(m){const el=document.getElementById('pin-err'); if(el) el.textContent=m||'';}
function avatarColor(id){ const c=['#FFC83D','#15B66E','#4FA8E0','#E0794F','#B07FE0','#E04F8A','#3DC9C0','#9CCF3D','#E0B84F','#6FCF5B','#5B9BCF']; return c[id % c.length]; }
function initialsOf(n){ return (n||'?').trim().slice(0,2).toUpperCase(); }
function profEmail(id){ return 'profile'+id+'@pollafamiliar.app'; }
function pinPass(pin){ return 'Pf26#'+pin; }
function setAvatars(arr){ (arr||[]).forEach(p=>{ S.avatars[p.id]=p.avatar_url||null; }); }
function avatarMarkup(id, name, size){
  const s=size||40, url=S.avatars[id];
  if(url) return '<img src="'+url+'" alt="" style="width:'+s+'px;height:'+s+'px;border-radius:50%;object-fit:cover;flex:none;display:block">';
  return '<span style="width:'+s+'px;height:'+s+'px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;color:#0B1B2B;background:'+avatarColor(id)+';font-size:'+Math.round(s*0.42)+'px;flex:none">'+esc(initialsOf(name))+'</span>';
}
function renderMyAvatar(){ const el=document.getElementById('my-av'); if(el&&S.me) el.innerHTML=avatarMarkup(S.me.id,S.me.name,36); }
function pickAvatar(){ const f=document.getElementById('av-file'); if(f) f.click(); }
function onAvatarFile(ev){
  const file=ev.target.files&&ev.target.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{ const img=new Image();
    img.onload=async ()=>{
      const s=160, c=document.createElement('canvas'); c.width=s; c.height=s;
      const ctx=c.getContext('2d'); const m=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,s,s);
      const data=c.toDataURL('image/jpeg',0.78);
      const { error } = await sb.rpc('set_avatar',{ p_data:data });
      if(error){ toast('No se pudo guardar la foto','bad'); return; }
      S.me.avatar_url=data; S.avatars[S.me.id]=data; renderMyAvatar(); toast('Foto actualizada','ok');
      if(S.tab) go(S.tab);
    };
    img.onerror=()=>toast('No se pudo leer la imagen','bad');
    img.src=rd.result;
  };
  rd.onerror=()=>toast('No se pudo leer el archivo','bad');
  rd.readAsDataURL(file);
  ev.target.value='';
}
let PROFILES=[], PICK=null;
async function renderProfiles(){
  lerr('');
  const { data, error } = await sb.rpc('list_profiles');
  const grid=document.getElementById('profiles'); if(!grid) return;
  if(error || !data){ grid.innerHTML='<p class="sub" style="grid-column:1/-1">No se pudieron cargar los perfiles.</p>'; return; }
  PROFILES=data; setAvatars(data);
  grid.innerHTML=data.map(p=>
    '<div class="prof-card" onclick="pickProfile('+p.id+')">'
    +(p.avatar_url
        ? '<img class="prof-av" src="'+p.avatar_url+'" style="object-fit:cover">'
        : '<div class="prof-av" style="background:'+avatarColor(p.id)+'">'+esc(initialsOf(p.name))+'</div>')
    +'<div class="prof-name">'+esc(p.name)+'</div>'
    +'<div class="prof-lock">'+(p.has_pin?'🔒 clave':'➕ crear clave')+'</div></div>'
  ).join('');
}
function pickProfile(id){
  PICK=PROFILES.find(p=>p.id===id); if(!PICK) return;
  const av=document.getElementById('pin-av');
  if(PICK.avatar_url){ av.innerHTML='<img src="'+PICK.avatar_url+'" style="width:100%;height:100%;border-radius:50%;object-fit:cover">'; av.style.background='transparent'; }
  else { av.innerHTML=''; av.textContent=initialsOf(PICK.name); av.style.background=avatarColor(PICK.id); }
  document.getElementById('pin-title').textContent='Hola, '+PICK.name;
  document.getElementById('pin-sub').textContent=PICK.has_pin?'Ingresa tu clave de 4 dígitos':'Crea tu clave de 4 dígitos';
  document.getElementById('pin-btn').textContent=PICK.has_pin?'Entrar':'Crear y entrar';
  perr(''); const inp=document.getElementById('pin-input'); inp.value='';
  document.getElementById('pinModal').classList.remove('hidden');
  setTimeout(()=>inp.focus(),60);
}
function closePin(){ document.getElementById('pinModal').classList.add('hidden'); PICK=null; }
async function submitPin(){
  if(!PICK) return;
  const pin=(document.getElementById('pin-input').value||'').trim(); perr('');
  if(!/^[0-9]{4}$/.test(pin)){ perr('Son 4 dígitos numéricos.'); return; }
  const btn=document.getElementById('pin-btn'); btn.disabled=true; const t0=btn.textContent; btn.textContent='Entrando…';
  const email=profEmail(PICK.id), pass=pinPass(pin);
  try{
    if(PICK.has_pin){
      const { error } = await sb.auth.signInWithPassword({ email, password:pass });
      if(error){ perr('Clave incorrecta. Intenta de nuevo.'); }
      return;
    }
    const { data:su, error:e1 } = await sb.auth.signUp({ email, password:pass });
    if(e1 && !/already|registered|exists/i.test(e1.message||'')){ perr(e1.message); return; }
    if(!(su && su.session)){
      try{ await sb.rpc('confirm_email',{ p_email:email }); }catch(e){}
      const { error:e2 } = await sb.auth.signInWithPassword({ email, password:pass });
      if(e2){ perr('No se pudo crear la clave. Intenta de nuevo.'); return; }
    }
  } finally { btn.disabled=false; btn.textContent=t0; }
}
async function logout(){ await sb.auth.signOut(); location.reload(); }
function fireConfetti(){
  if(typeof confetti!=='function') return;
  confetti({particleCount:130,spread:75,origin:{y:0.6}});
  setTimeout(()=>confetti({particleCount:90,spread:110,startVelocity:35,origin:{y:0.5}}),250);
}
async function celebrateExacts(initial){
  if(!S.me) return;
  const { data } = await sb.from('predictions')
    .select('match_id,is_exact,match:match_id(status)')
    .eq('participant_id',S.me.id).eq('is_exact',true);
  const exacts=(data||[]).filter(p=>p.match && p.match.status==='FINALIZADO').map(p=>p.match_id);
  if(initial || !S.celebrated){ S.celebrated=new Set(exacts); return; }
  const fresh=exacts.filter(id=>!S.celebrated.has(id));
  if(fresh.length){ fresh.forEach(id=>S.celebrated.add(id)); fireConfetti(); toast('¡EXACTO! 🎯 +2','ok'); }
}

let booted=false;
async function boot(){
  if(booted) return; booted=true;
  let { data, error } = await sb.rpc('register_profile');
  if(error){ toast('No se pudo iniciar tu perfil: '+error.message,'bad'); booted=false; return; }
  S.me = data;
  S.avatars[S.me.id] = S.me.avatar_url || null;
  document.getElementById('pinModal').classList.add('hidden');
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('who-name').textContent = S.me.name;
  if(S.me.is_admin) document.getElementById('admin-btn').classList.remove('hidden');
  try{ const r=await sb.rpc('list_profiles'); setAvatars(r.data||[]); }catch(e){}
  renderMyAvatar();
  await loadReference();
  subscribeLive();
  celebrateExacts(true);

}
async function loadReference(){
  const [ph, cfg, tm, subs] = await Promise.all([
    sb.from('phase_config').select('*'),
    sb.from('app_config').select('*').single(),
    sb.from('teams').select('id,name,flag').order('name'),
    sb.from('phase_submissions').select('phase').eq('participant_id', S.me.id)
  ]);
  (ph.data||[]).forEach(p=>S.phases[p.phase]=p);
  S.config = cfg.data||{};
  S.teams = tm.data||[];
  S.submissions = {}; (subs.data||[]).forEach(s=>S.submissions[s.phase]=true);
}
function subscribeLive(){
  sb.channel('live')
    .on('postgres_changes',{event:'*',schema:'public',table:'matches'},()=>{ if(S.tab==='tabla')loadTabla(); if(S.tab==='res')loadResultados(); if(S.tab==='todos')loadTodos(); if(S.tab==='llave')loadLlave(); celebrateExacts(false); })
    .on('postgres_changes',{event:'*',schema:'public',table:'predictions'},()=>{ if(S.tab==='tabla')loadTabla(); })
    .subscribe();
}

function go(tab){
  S.tab=tab;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  loading();
  if(tab==='pred')return loadPred();
  if(tab==='tabla')return loadTabla();
  if(tab==='res')return loadResultados();
  if(tab==='llave')return loadLlave();
  if(tab==='todos')return loadTodos();
  if(tab==='equipos')return loadEquipos();

const MATCH_COLS='id,phase,group_name,kickoff_at,stadium,deadline_at,enabled,status,live_clock,home_goals,away_goals,home_scorers,away_scorers,home_label,away_label,home_team:home_team_id(name,flag),away_team:away_team_id(name,flag)';
async function loadPred(){
  const { data } = await sb.from('matches').select('phase,enabled');
  S.enabledPhases = new Set((data||[]).filter(r=>r.enabled).map(r=>r.phase));
  S.allPhases = FASE_ORDER.filter(f=>S.phases[f]);
  if(S.allPhases.length===0) return paint(emptyState('⏳','Aún no hay fases','Pronto podrás cargar tus pronósticos aquí.'));
  if(!S.fase || !S.allPhases.includes(S.fase)) S.fase = S.allPhases.find(f=>S.enabledPhases.has(f)) || S.allPhases[0];
  await loadFase();
}
async function loadFase(){
  const fase=S.fase;
  if(!S.enabledPhases.has(fase)){ S.fixture=[]; S.preds={}; renderPred(); return; }
  const [fx, pr, bn] = await Promise.all([
    sb.from('matches').select(MATCH_COLS).eq('phase',fase).eq('enabled',true).order('id'),
    sb.from('predictions').select('match_id,home_goals,away_goals').eq('participant_id',S.me.id),
    fase==='GRUPOS'? sb.from('bonus_predictions').select('top_scorer:top_scorer_id(id,name),mvp:mvp_id(id,name),finalist1_id,finalist2_id').eq('participant_id',S.me.id).single() : Promise.resolve({data:null})
  ]);
  S.fixture = fx.data||[];
  S.preds={}; (pr.data||[]).forEach(p=>S.preds[p.match_id]={home:p.home_goals,away:p.away_goals});
  if(fase==='GRUPOS' && bn.data){
    S.extras={ goleador: bn.data.top_scorer?.name||'', mvp: bn.data.mvp?.name||'',
               finalist1_id: bn.data.finalist1_id, finalist2_id: bn.data.finalist2_id };
  }
  renderPred();
}
function renderPred(){
  const fase=S.fase, ph=S.phases[fase]||{points_exact:2,points_winner:1,label:fase};
  const open=S.enabledPhases.has(fase);
  let chips='<div class="phase-row">'+S.allPhases.map(f=>'<button class="chip '+(f===fase?'active':'')+'" onclick="selFase(\''+f+'\')">'+esc(S.phases[f]?.label||f)+(S.enabledPhases.has(f)?'':' 🔒')+'</button>').join('')+'</div>';
  if(!open){
    const idx=FASE_ORDER.indexOf(fase), prev=idx>0?S.phases[FASE_ORDER[idx-1]]?.label:null;
    const head='<div class="section-head"><div><div class="eyebrow">Mis pronósticos</div><h2>'+esc(ph.label)+'</h2></div></div>';
    const card='<div class="card pad" style="text-align:center;padding:30px 18px"><div style="font-size:40px">🔒</div>'
      +'<h3 style="font-family:\'Barlow Condensed\',sans-serif;font-size:24px;margin:8px 0 4px">Próximamente</h3>'
      +'<p class="muted" style="font-size:13px;line-height:1.5">Los pronósticos de <b>'+esc(ph.label)+'</b> se abrirán '
      +(prev?'cuando termine <b>'+esc(prev)+'</b>':'cuando avance el torneo')
      +'.<br>Valen Exacto +'+ph.points_exact+' · Ganador +'+ph.points_winner+'. ¡Prepárate! 🏆</p></div>';
    return paint(chips+head+card);
  }
  const enviada=!!S.submissions[fase];
  let head='<div class="section-head"><div><div class="eyebrow">Mis pronósticos</div><h2>'+esc(ph.label)+'</h2></div>'
    +(enviada?'<span class="pill sent">✓ Enviado</span>':'<span class="muted" style="font-size:12px">Exacto +'+ph.points_exact+' · Ganador +'+ph.points_winner+'</span>')+'</div>';
  let banner = enviada? '<div class="banner">Ya enviaste esta fase. Tus pronósticos quedaron guardados y no se pueden cambiar.</div>':'';
  let remind='';
  if(!enviada){
    const now=Date.now();
    const dls=S.fixture.map(m=>m.deadline_at).filter(Boolean).map(d=>new Date(d).getTime()).filter(t=>t>now);
    if(dls.length){
      const mins=Math.round((Math.min(...dls)-now)/60000);
      if(mins<=120){ const txt=mins>=60?Math.floor(mins/60)+'h '+(mins%60)+'m':mins+'m';
        remind='<div class="banner" style="background:#FFF4D6;border-color:#E6B800;color:#7A5B00">⏰ ¡Quedan '+txt+' para cerrar tus pronósticos! No te quedes sin jugar.</div>'; }
    }
  }
  let tickets='';
  if(S.fixture.length===0) tickets=emptyState('🗓️','Sin partidos','Esta fase aún no tiene partidos.');
  else S.fixture.forEach(m=>{
    const locked=enviada||lockedByDate(m.deadline_at);
    const p=S.preds[m.id]||{};
    tickets+=ticket(m, (p.home==null?null:p.home), (p.away==null?null:p.away), locked);
  });
  let extras = fase==='GRUPOS'? extrasBlock(enviada||lockedByDate(ph.deadline)) : '';
  let actions='';
  if(!enviada){
    const canSend = S.config.submissions_open || S.me.can_submit;
    actions='<div class="actions"><button class="btn ghost" onclick="guardar(false)">Guardar borrador</button>'
      +'<button class="btn send" '+(canSend?'':'disabled')+' onclick="guardar(true)">Enviar definitivo</button></div>'
      +(canSend?'':'<p class="muted center" style="font-size:12px;margin-top:8px">El envío definitivo se abre cuando el admin lo habilite.</p>');
  }
  paint(chips+head+banner+remind+tickets+extras+actions);
}
function ticket(m,lv,vv,locked){
  const h=teamOf(m,'home'), a=teamOf(m,'away');
  const grp=(m.group_name?'Grupo '+m.group_name:(S.phases[m.phase]?.label||m.phase));
  const status=locked?'<span class="pill closed">Cerrado</span>':'<span class="pill open">'+esc(fmtFecha(m.kickoff_at))+'</span>';
  return '<div class="card ticket '+(locked?'locked':'')+'">'
    +'<div class="ticket-meta"><span class="grp">'+esc(grp)+'</span>'+status+'</div>'
    +'<div class="ticket-body">'
    +'<div class="team"><span class="flag">'+h.flag+'</span><span class="name">'+esc(h.name)+'</span></div>'
    +'<div class="score-pod">'+stepper(m.id,'home',lv,locked)+'<span class="vs">vs</span>'+stepper(m.id,'away',vv,locked)+'</div>'
    +'<div class="team"><span class="flag">'+a.flag+'</span><span class="name">'+esc(a.name)+'</span></div>'
    +'</div></div>';
}
function stepper(id,side,val,locked){
  const empty=(val==null), digit=empty?'–':String(val);
  const btns=locked?'':'<div class="stepper-btns"><button onclick="adj('+id+',\''+side+'\',-1)">–</button><button onclick="adj('+id+',\''+side+'\',1)">+</button></div>';
  return '<div class="stepper"><div class="digit '+(empty?'empty':'')+'" id="d-'+id+'-'+side+'">'+digit+'</div>'+btns+'</div>';
}
function adj(id,side,d){
  if(!S.preds[id])S.preds[id]={home:null,away:null};
  let c=S.preds[id][side]; c=(c==null)?null:Number(c);
  let n = d>0 ? (c==null?0:Math.min(c+1,20)) : (c==null?null:(c<=0?null:c-1));
  S.preds[id][side]=n;
  const el=document.getElementById('d-'+id+'-'+side);
  if(el){el.textContent=(n==null?'–':n);el.classList.toggle('empty',n==null);}
}

function selFase(f){S.fase=f;loading();loadFase();}
function resolvePlayer(v){ v=(v||'').trim(); return PLAYERS_BY_NAME[v.toLowerCase()]||null; }
async function ensurePlayerMap(){
  if(Object.keys(PLAYERS_BY_NAME).length) return;
  const { data } = await sb.from('players').select('id,name');
  (data||[]).forEach(p=>PLAYERS_BY_NAME[p.name.toLowerCase()]=p.id);
}
async function guardar(definitivo){
  const fase=S.fase;
  const items=S.fixture.map(m=>({match_id:m.id, home:(S.preds[m.id]?.home??null), away:(S.preds[m.id]?.away??null)}))
                       .filter(x=>x.home!=null && x.away!=null);
  if(definitivo && !confirm('Al enviar no podrás cambiar tus pronósticos de '+(S.phases[fase]?.label||fase)+'. ¿Enviar?')) return;
  toast('Guardando…');
  if(fase==='GRUPOS'){
    const f1=document.getElementById('ex-f1'), f2=document.getElementById('ex-f2');
    if(f1 && !f1.disabled){
      await ensurePlayerMap();
      await sb.rpc('save_bonus',{ p_top:resolvePlayer(document.getElementById('ex-gol').value),
        p_mvp:resolvePlayer(document.getElementById('ex-mvp').value),
        p_f1:f1.value?Number(f1.value):null, p_f2:f2.value?Number(f2.value):null });
    }
  }
  const { data, error } = await sb.rpc('save_predictions',{ p_phase:fase, p_items:items, p_final:definitivo });
  if(error){ toast('Error: '+error.message,'bad'); return; }
  if(data!=='OK'){ toast(traduce(data),'bad'); return; }
  if(definitivo){ S.submissions[fase]=true; toast('¡Enviado! Buena suerte','ok'); renderPred(); }
  else toast('Borrador guardado','ok');
}
function traduce(c){return ({LOCKED:'Esta fase ya fue enviada',SUBMIT_CLOSED:'El envío aún no está habilitado',NO_USER:'Sesión no válida'})[c]||c;}

function rankTiers(rows){
  const tiers=[]; let cur=null;
  rows.forEach(r=>{ const key=(r.pts_total||0)+'_'+(r.exact_count||0);
    if(!cur || cur.key!==key){ cur={key,pts:r.pts_total||0,people:[]}; tiers.push(cur); }
    cur.people.push(r);
  });
  return tiers;
}
function podStep(tier, place){
  if(!tier) return '<div class="pod-col"></div>';
  const medal=place===1?'🥇':place===2?'🥈':'🥉', cls=place===1?'gold':place===2?'silver':'bronze';
  const ppl=tier.people, shown=ppl.slice(0,3), n=ppl.length, hi=tier.rank+n-1;
  let names=shown.map(p=>'<div class="pod-person">'+avatarMarkup(p.id,p.name,22)+'<span class="pod-name">'+esc(p.name.split(' ')[0])+'</span></div>').join('');
  if(ppl.length>3) names+='<div class="pod-name" style="color:var(--muted)">+'+(ppl.length-3)+' más</div>';
  const share = n>1 ? '<div style="font-size:10px;color:var(--muted);margin-top:1px">comparten '+tier.rank+'°–'+hi+'°</div>' : '';
  return '<div class="pod-col"><div class="pod-medal">'+medal+'</div>'
    +'<div class="pod-people">'+names+'</div>'+share
    +'<div class="pod-pts">'+tier.pts+' pts</div>'
    +'<div class="pod-block '+cls+'">'+place+'</div></div>';
}
async function loadTabla(){
  const [{ data }, snap] = await Promise.all([
    sb.from('leaderboard').select('*'),
    sb.rpc('get_rank_snap')
  ]);
  const rows=data||[];
  if(rows.length===0) return paint(emptyState('🏅','Tabla vacía','Cuando se carguen resultados verás el ranking de la familia.'));
  const prev=snap.data||{};
  const tiers=rankTiers(rows);
  let ahead=0; tiers.forEach(t=>{ t.rank=ahead+1; ahead+=t.people.length; });
  const rankOf={}; tiers.forEach(t=>t.people.forEach(p=>rankOf[p.id]=t.rank));
  const byRank=r=>tiers.find(t=>t.rank===r);
  const moveArrow=(id)=>{ const p=prev[id], c=rankOf[id]; if(p==null) return '';
    if(c<p) return ' <span style="color:var(--pitch);font-size:11px" title="subió">▲</span>';
    if(c>p) return ' <span style="color:var(--hot);font-size:11px" title="bajó">▼</span>';

const KO_ORDER=['DIECISEISAVOS','OCTAVOS','CUARTOS','SEMIS','FINAL','TERCER_LUGAR'];

const KO_SHORT={DIECISEISAVOS:'16avos',OCTAVOS:'8vos',CUARTOS:'4tos',SEMIS:'Semis',FINAL:'Final',TERCER_LUGAR:'3º'};
function koHuman(l){ if(!l) return 'Por definir'; if(/^G\.\d+$/.test(l)) return 'Ganador'; if(l==='TBD') return 'Por definir'; return l; }
function koSide(team, label, win){

function brkCard(m){

function selKo(f){ S.koRound=f; loadLlave(); }
async function loadLlave(){

    .select('id,phase,status,home_goals,away_goals,winner_team_id,home_team_id,away_team_id,home_label,away_label,kickoff_at,home_team:home_team_id(name,flag),away_team:away_team_id(name,flag)')
    .neq('phase','GRUPOS').order('id');

function closePlayer(){ document.getElementById('playerModal').classList.add('hidden'); }
function ppTag(p){
  const m=p.match||{};
  if(m.status==='FINALIZADO'){
    if(p.is_exact) return {t:'EXACTO +'+(p.points||0),c:'ex'};
    if((p.points||0)>0) return {t:'GANADOR +'+(p.points||0),c:'win'};
    return {t:'Falló',c:'miss'};
  }
  return {t:'Por jugar',c:'pend'};
}
async function openPlayer(id){
  const modal=document.getElementById('playerModal'), body=document.getElementById('player-body');
  body.innerHTML='<p class="muted" style="padding:24px;text-align:center">Cargando…</p>';

  ]);
  const rows=lb.data||[]; const tiers=rankTiers(rows); let ahead=0; tiers.forEach(t=>{t.rank=ahead+1;ahead+=t.people.length;});

function playerHtml(id, me, rank, preds){
  const total=me.pts_total||0, ex=me.exact_count||0;
  const byPhase={}; preds.forEach(p=>{ const ph=p.match?.phase||'?'; (byPhase[ph]=byPhase[ph]||[]).push(p); });
  let summary='', list='';
  FASE_ORDER.forEach(f=>{ const arr=byPhase[f]; if(!arr||!arr.length) return;
    let exc=0,win=0,miss=0,pend=0;
    arr.forEach(p=>{ const m=p.match||{}; if(m.status==='FINALIZADO'){ if(p.is_exact)exc++; else if((p.points||0)>0)win++; else miss++; } else pend++; });
    summary+='<div><b>'+esc(S.phases[f]?.label||f)+':</b> '+exc+' exactos · '+win+' ganador · '+miss+' fallados'+(pend?' · '+pend+' por jugar':'')+'</div>';
    list+='<div class="eyebrow" style="margin:14px 2px 4px">'+esc(S.phases[f]?.label||f)+'</div>';
    arr.sort((a,b)=>String(a.match?.kickoff_at||'').localeCompare(String(b.match?.kickoff_at||'')));
    arr.forEach(p=>{ const m=p.match||{}; const tg=ppTag(p);
      const hn=m.home_team?(m.home_team.flag+' '+esc(m.home_team.name)):esc(koHuman(m.home_label));
      const an=m.away_team?(esc(m.away_team.name)+' '+m.away_team.flag):esc(koHuman(m.away_label));
      const real=(m.status==='FINALIZADO'||m.status==='EN_JUEGO')?(m.home_goals+'–'+m.away_goals):'—';
      list+='<div class="pp-row"><div style="flex:1;min-width:0"><div class="pp-match">'+hn+' <b>'+p.home_goals+'–'+p.away_goals+'</b> '+an+'</div>'
        +'<div class="pp-sub">Resultado: '+real+'</div></div><span class="pp-tag '+tg.c+'">'+tg.t+'</span></div>';
    });
  });
  return '<button class="pin-close" onclick="closePlayer()">✕</button>'
    +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'+avatarMarkup(id,me.name,56)
    +'<div><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:22px;font-weight:700;line-height:1">'+esc(me.name||'')+'</div>'
    +'<div class="muted" style="font-size:13px;margin-top:2px">'+(rank?'Puesto '+rank+'° · ':'')+total+' pts · '+ex+' exactos</div></div></div>'
    +'<div class="pp-stats"><div><span>'+(me.pts_grupos||0)+'</span>Grupos</div><div><span>'+(me.pts_eliminatorias||0)+'</span>Elim</div><div><span>'+(me.pts_bonus||0)+'</span>Extras</div><div><span>'+total+'</span>Total</div></div>'
    +(summary?'<div class="eyebrow" style="margin:14px 2px 6px">Aciertos por fase</div><div class="pp-sumwrap">'+summary+'</div>':'')
    +(list?'<div class="eyebrow" style="margin:16px 2px 6px">Todos sus pronósticos</div>'+list:'<p class="muted" style="font-size:13px;margin-top:12px">Aún sin pronósticos para mostrar.</p>');
}
function resRow(r, mode){
  const hh=teamOf(r,'home'),aa=teamOf(r,'away');
  let center;
  if(mode==='next') center='<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:600;font-size:12px;color:var(--muted);text-align:center;line-height:1.15;min-width:70px">'+esc(fmtFecha(r.kickoff_at)||'Por definir')+'</div>';
  else center='<div class="res-score tnum"'+(mode==='live'?' style="background:var(--hot)"':'')+'>'+(r.home_goals??0)+'–'+(r.away_goals??0)+'</div>';
  let h='<div class="res-item" style="border-bottom:1px solid var(--line)">'
    +'<div class="res-row" style="cursor:pointer;border-bottom:none" onclick="toggleApuestas('+r.id+')">'
    +'<div class="res-team">'+hh.flag+' '+esc(hh.name)+'</div>'+center
    +'<div class="res-team away">'+esc(aa.name)+' '+aa.flag+' <span style="color:var(--muted);font-size:11px">▾</span></div></div>';
  const hList = r.home_scorers ? esc(r.home_scorers).split(', ') : [];
  const aList = r.away_scorers ? esc(r.away_scorers).split(', ') : [];
  const missH = Math.max(0,(r.home_goals||0)-hList.length);
  const missA = Math.max(0,(r.away_goals||0)-aList.length);
  let scH = hList.length ? '⚽ '+hList.join('<br>') : '';
  if(missH>0) scH += (scH?'<br>':'')+'<span style="opacity:.6">+'+missH+' gol s/ detalle</span>';
  let scA = aList.length ? aList.join('<br>')+' ⚽' : '';
  if(missA>0) scA += (scA?'<br>':'')+'<span style="opacity:.6">+'+missA+' gol s/ detalle</span>';
  if((mode==='live'||mode==='fin') && (scH||scA)){
    h+='<div style="display:flex;gap:12px;font-size:11px;color:var(--muted);padding:0 14px 8px;margin-top:-2px;line-height:1.5">'
      +'<div style="flex:1;text-align:left">'+scH+'</div>'
      +'<div style="flex:1;text-align:right">'+scA+'</div></div>';
  }
  if(mode==='live') h+='<div class="scorers" style="color:var(--hot);font-weight:600;text-align:center">⏱ '+esc(r.live_clock||'En juego')+'</div>';
  h+='<div id="det-'+r.id+'"></div></div>';
  return h;
}

function renderRes(){
  const all=S.resData||[];

      next.forEach(r=>{ h+=resRow(r,'next'); }); h+='</div>';

  }
  if(live.length) h+='<p class="muted center" style="font-size:12px;margin-top:10px">La tabla suma el marcador en vivo; queda firme al terminar.</p>';

function normTxt(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function pickScorer(pickName, scorers){
  if(!pickName) return null;
  const toks=normTxt(pickName).split(/\s+/).filter(t=>t.length>=4);
  return (scorers||[]).find(s=>{ const n=normTxt(s.name); return toks.some(t=>n.includes(t)); }) || null;
}
async function loadTodos(){

  const rows=data||[];
  await ensurePlayerMap();
  const dl=document.getElementById('dl-players'); if(dl) dl.innerHTML=Object.keys(PLAYERS_BY_NAME).length? rows.map(p=>'<option value="'+esc(p.name)+'">').join(''):'';
  if(rows.length===0) return paint(emptyState('👕','Planteles aún no cargados','Se importan próximamente desde la API.'));
  const byT={}; rows.forEach(p=>{const t=p.team?.name||'—';(byT[t]=byT[t]||{flag:p.team?.flag||NEUTRAL_FLAG,arr:[]}).arr.push(p);});
  let h='<div class="section-head"><div><div class="eyebrow">Jugadores</div><h2>Planteles</h2></div></div>';
  h+='<div class="field"><input id="eq-q" placeholder="🔎 Buscar jugador o país…" oninput="filtraEq()"></div><div id="eq-list">';
  Object.keys(byT).sort((a,b)=>a.localeCompare(b,'es')).forEach(t=>{
    const o=byT[t];
    h+='<details class="card" data-pais="'+esc(t.toLowerCase())+'" style="margin-bottom:10px"><summary style="list-style:none;cursor:pointer;padding:14px 16px;display:flex;align-items:center;gap:10px;font-weight:600"><span style="font-size:22px">'+o.flag+'</span>'+esc(t)+'<span class="muted" style="margin-left:auto;font-size:12px">'+o.arr.length+' jug.</span></summary><div style="padding:0 16px 14px">';
    o.arr.forEach(j=>{const g=(j.goals||0)>0?'<span style="color:var(--pitch);font-weight:600">⚽ '+j.goals+'</span>':'';
      h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--line);font-size:13px" data-jug="'+esc((j.name||'').toLowerCase())+'"><span class="muted" style="width:34px;font-size:11px">'+esc(j.position||'')+'</span><span style="flex:1">'+esc(j.name)+'</span>'+g+'</div>';
    });
    h+='</div></details>';
  });
  paint(h+'</div>');
}
function filtraEq(){const q=(document.getElementById('eq-q').value||'').toLowerCase().trim();
  document.querySelectorAll('#eq-list details').forEach(d=>{let any=(d.dataset.pais||'').includes(q);
    d.querySelectorAll('[data-jug]').forEach(r=>{const hit=!q||r.dataset.jug.includes(q);r.style.display=hit?'':'none';if(hit&&q)any=true;});
    d.style.display=(!q||any)?'':'none'; if(q&&any)d.open=true; if(!q)d.open=false;});
}

function openInfo(){
  const rows=FASE_ORDER.map(f=>{const p=S.phases[f]||{};return '<div>'+esc(p.label||f)+'</div><b class="center">+'+(p.points_exact||'')+'</b><b class="center">+'+(p.points_winner||'')+'</b>';}).join('');
  document.getElementById('modal-root').innerHTML='<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal"><header><h3>Cómo se juega</h3><button class="icon-btn" style="background:#EEF2F0;color:var(--ink)" onclick="closeModal()">✕</button></header><div class="body"><p class="muted" style="font-size:13px;margin-bottom:16px">Pronostica el marcador exacto. Aciertas más mientras más avanza el torneo.</p><div style="display:grid;grid-template-columns:1fr auto auto;gap:8px 12px;font-size:14px;align-items:center"><div class="eyebrow">Fase</div><div class="eyebrow center">Exacto</div><div class="eyebrow center">Ganador</div>'+rows+'</div><p class="muted" style="font-size:12px;margin-top:16px">Bonus: 🥇 Goleador +5 · ⭐ MVP +5 · 🏁 un finalista +2 · los dos +6.</p></div></div></div>';
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

async function openAdmin(){
  const { data:fin } = await sb.from('matches').select(MATCH_COLS).eq('enabled',true).neq('status','FINALIZADO').order('id').limit(80);
  const opts=(fin||[]).map(m=>{const a=teamOf(m,'home'),b=teamOf(m,'away');return '<option value="'+m.id+'">#'+m.id+' '+esc(a.name)+' vs '+esc(b.name)+'</option>';}).join('');
  const phaseOpts=FASE_ORDER.map(f=>'<option value="'+f+'">'+esc(S.phases[f]?.label||f)+'</option>').join('');
  document.getElementById('modal-root').innerHTML='<div class="modal-back" onclick="if(event.target===this)closeModal()"><div class="modal"><header><h3>Admin</h3><button class="icon-btn" style="background:#EEF2F0;color:var(--ink)" onclick="closeModal()">✕</button></header><div class="body">'
    +'<div class="eyebrow" style="margin-bottom:8px">Cargar resultado</div>'
    +'<div class="field"><select id="ad-m">'+opts+'</select></div>'
    +'<div class="grid2"><div class="field"><label>Local</label><input id="ad-h" inputmode="numeric"></div><div class="field"><label>Visita</label><input id="ad-a" inputmode="numeric"></div></div>'
    +'<div class="field"><label>Goleadores local</label><input id="ad-hs" placeholder="opcional"></div>'
    +'<div class="field"><label>Goleadores visita</label><input id="ad-as" placeholder="opcional"></div>'
    +'<button class="btn primary" style="width:100%" onclick="adResult()">Guardar resultado</button>'
    +'<div class="eyebrow" style="margin:22px 0 8px">Habilitar fase</div><div class="field"><select id="ad-ph">'+phaseOpts+'</select></div>'
    +'<button class="btn ghost" style="width:100%" onclick="adPhase()">Habilitar partidos de la fase</button>'
    +'<div class="eyebrow" style="margin:22px 0 8px">Visibilidad</div>'
    +'<label style="display:flex;gap:8px;align-items:center;margin-bottom:10px"><input type="checkbox" id="ad-vis" '+(S.config.predictions_visible?'checked':'')+'> Mostrar pronósticos de todos</label>'
    +'<label style="display:flex;gap:8px;align-items:center;margin-bottom:14px"><input type="checkbox" id="ad-sub" '+(S.config.submissions_open?'checked':'')+'> Permitir envío definitivo</label>'
    +'<button class="btn ghost" style="width:100%" onclick="adFlags()">Guardar visibilidad</button>'
    +'</div></div></div>';
}
async function adResult(){
  const id=Number(document.getElementById('ad-m').value);
  const h=Number(document.getElementById('ad-h').value), a=Number(document.getElementById('ad-a').value);
  if(isNaN(h)||isNaN(a)){toast('Pon ambos marcadores','bad');return;}
  const { error }=await sb.rpc('set_result',{p_match_id:id,p_home:h,p_away:a,p_home_scorers:document.getElementById('ad-hs').value||null,p_away_scorers:document.getElementById('ad-as').value||null});
  toast(error?('Error: '+error.message):'Resultado guardado',error?'bad':'ok');
}
async function adPhase(){const { error }=await sb.rpc('enable_phase',{p_phase:document.getElementById('ad-ph').value});toast(error?'Error':'Fase habilitada',error?'bad':'ok');}
async function adFlags(){const { error }=await sb.rpc('set_flags',{p_predictions_visible:document.getElementById('ad-vis').checked,p_submissions_open:document.getElementById('ad-sub').checked});
  if(!error){S.config.predictions_visible=document.getElementById('ad-vis').checked;S.config.submissions_open=document.getElementById('ad-sub').checked;}
  toast(error?'Error':'Guardado',error?'bad':'ok');}
</script>
</body>
</html>
